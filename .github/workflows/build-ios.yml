name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.5'

      - name: Flutter precache (iOS)
        run: flutter precache --ios

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build Archive
        run: |
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Runner.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Verify Archive
        run: |
          ls -la build/Runner.xcarchive/
          ls -la build/Runner.xcarchive/Products/Applications/

      - name: Create Provisional IPA
        run: |
          # Create IPA manually from xcarchive
          cd build/Runner.xcarchive/Products/Applications
          mkdir -p ../../../../ipa/Payload
          cp -r Runner.app ../../../../ipa/Payload/
          cd ../../../../ipa
          zip -r ../chatmcp.ipa Payload/
          cd ../..

      - name: Verify IPA
        run: |
          echo "=== IPA contents ==="
          unzip -l build/chatmcp.ipa | head -20
          echo "=== IPA size ==="
          ls -lh build/chatmcp.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: chatmcp-ios-ipa
          path: build/chatmcp.ipa
          retention-days: 30
