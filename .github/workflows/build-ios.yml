name: Build iOS IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.5'

      - name: Flutter precache (iOS)
        run: flutter precache --ios

      - name: Install dependencies
        run: flutter pub get

      - name: Setup code signing (optional)
        if: github.event_name != 'pull_request'
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          # Import certificate if provided
          if [ -n "$APPLE_CERT_P12" ]; then
            echo "$APPLE_CERT_P12" | base64 -d > /tmp/cert.p12
            security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
            echo "✅ Certificate imported"
          else
            echo "ℹ️  No certificate provided, building with debug signing"
          fi

      - name: Build IPA
        run: |
          cd ios
          pod install --repo-update
          cd ..
          flutter build ipa --release --no-codesign
        env:
          CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE: ""

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatmcp-ios-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 30
