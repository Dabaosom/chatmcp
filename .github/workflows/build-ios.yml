name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.5'

      - name: Flutter precache (iOS)
        run: flutter precache --ios

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build IPA
        run: |
          cd ios
          xcodebuild -configuration Release \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -arch arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=build/ios/ipa \
            SKIP_INSTALL=NO \
            | xcpretty

      - name: Package IPA
        run: |
          # Package the .app into an IPA
          APP_PATH=build/ios/ipa/Runner.app
          if [ -d "$APP_PATH" ]; then
            cd build/ios/ipa
            mkdir -p Payload
            cp -r Runner.app Payload/
            zip -ry chatmcp.ipa Payload/
            rm -rf Payload
            cd ../..
          else
            echo "Runner.app not found in build/ios/ipa/"
            ls -la build/ios/ipa/
            echo "Trying alternate approach..."
            # Try xcarchive approach
            ARCHIVE_PATH=build/ios/archive/Runner.xcarchive
            if [ -d "$ARCHIVE_PATH" ]; then
              cd build/ios/archive
              mkdir -p Payload
              cp -r Runner.app Payload/
              zip -ry ../chatmcp.ipa Payload/
              rm -rf Payload
              cd ../..
            fi
          fi

      - name: Verify IPA
        run: |
          echo "=== Checking for IPA files ==="
          find build -name "*.ipa" -type f
          ls -la build/ios/ipa/ 2>/dev/null || echo "No ipa dir"
          ls -la build/ios/archive/ 2>/dev/null || echo "No archive dir"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: chatmcp-ios-ipa
          path: |
            build/ios/chatmcp.ipa
            chatmcp.ipa
          retention-days: 30
