name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.5'

      - name: Flutter precache (iOS)
        run: flutter precache --ios

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build Archive
        run: |
          set -e
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "${GITHUB_WORKSPACE}/build/Runner.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Create IPA
        run: |
          set -e
          ARCHIVE_PATH="${GITHUB_WORKSPACE}/build/Runner.xcarchive"
          APP_PATH="$ARCHIVE_PATH/Products/Applications/Runner.app"
          
          echo "=== Checking archive ==="
          ls -la "$ARCHIVE_PATH/"
          echo "=== Checking app ==="
          ls -la "$APP_PATH/"
          
          # Create IPA structure
          IPA_DIR="${GITHUB_WORKSPACE}/ipa_build"
          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"
          
          # Copy app to Payload
          cp -r "$APP_PATH" "$IPA_DIR/Payload/"
          
          # Create IPA (zip the Payload directory)
          cd "$IPA_DIR"
          zip -r "${GITHUB_WORKSPACE}/chatmcp.ipa" Payload/
          
          echo "=== IPA created ==="
          ls -lh "${GITHUB_WORKSPACE}/chatmcp.ipa"
          unzip -l "${GITHUB_WORKSPACE}/chatmcp.ipa" | head -20

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: chatmcp-ios-ipa
          path: chatmcp.ipa
          retention-days: 30
